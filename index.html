<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter's Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css\style.css">

</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">

                <img src="images/logo.png" alt="Hunter's Solutions Logo">

                <div class="logo-text">
                    <h2>Hunter's</h2>
                    <span>Solutions</span>
                </div>

            </div>
            <ul class="nav-links">

                <li><a href="#home">Home</a></li>

                <li><a href="#about">About us</a></li>

                <li><a href="#services">Services</a></li>

                <li><a href="#contact">Contact</a></li>

                <li><a href="#reviews">Reviews</a></li>

            </ul>
            <input type="checkbox" id="menu-toggle">

            <label for="menu-toggle" class="hamburger">

                <i class="fa-solid fa-bars"></i>

            </label>
        </nav>
    </header>
    <main>
        <section id="home" class="hero"></section>
        <section class="featured-properties"></section>
        <section class="informarion-section"></section>

    </main>
    <section id="home" class="hero">
        <div class="overlay">
            <div class="hero-content">
                <h1>Find Your Perfect Home.</h1>
                <p>Smart search, better finds, great living.</p>
                <div class="search-bar">
                    <div class="search-input">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search by keyword">

                    </div>
                    <select>
                        <option>Location</option>
                        <option>Nairobi</option>
                         <option>Kisumu</option>
                          <option>Mombasa</option>
                           <option>Nakuru</option>
                    </select>
                    <select>
                         <option>Bedrooms</option>
                          <option>2 Bedrooms</option>
                           <option>3 Bedrooms</option>
                    </select>
                    <select>
                         <option>Price Range</option>
                          <option>Ksh 20,000 - 30,000</option>
                           <option>Ksh 30,000 - 40,000</option>
                            <option>Ksh 40,000 - 50,000</option>
                    </select>
                </div>
            </div>
        </div>
    </section>




</body>

</html>
